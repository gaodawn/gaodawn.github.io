            { question: "一个大怪物，有头没有嘴，专吃电力饭，食物更美味", answer: "电烤箱" }
        ];

        let currentRiddleIndex = 0;
        let answeredCount = 0;
        let correctCount = 0;
        let incorrectCount = 0;
        let answeredRiddles = new Set();

        // 初始化游戏
        function initGame() {
            currentRiddleIndex = Math.floor(Math.random() * riddles.length);
            updateRiddle();
            updateStats();
        }

        // 更新灯谜显示
        function updateRiddle() {
            const riddleText = document.getElementById('riddle-text');
            const answerInput = document.getElementById('answer-input');
            const feedback = document.getElementById('feedback');
            const answerDisplay = document.getElementById('answer-display');
            
            riddleText.textContent = riddles[currentRiddleIndex].question;
            answerInput.value = '';
            feedback.textContent = '';
            answerDisplay.textContent = '';
        }

        // 检查答案
        function checkAnswer() {
            const answerInput = document.getElementById('answer-input');
            const feedback = document.getElementById('feedback');
            const userAnswer = answerInput.value.trim();
            const correctAnswer = riddles[currentRiddleIndex].answer;
            
            if (!userAnswer) {
                feedback.textContent = '请输入答案！';
                feedback.className = 'feedback incorrect';
                return;
            }
            
            if (!answeredRiddles.has(currentRiddleIndex)) {
                answeredRiddles.add(currentRiddleIndex);
                answeredCount++;
            }
            
            if (userAnswer === correctAnswer) {
                feedback.textContent = '恭喜答对了！🎉';
                feedback.className = 'feedback correct';
                if (!answeredRiddles.has(currentRiddleIndex) || answeredRiddles.size === 1) {
                    correctCount++;
                }
            } else {
                feedback.textContent = '答案不对哦，再想想吧！💡';
                feedback.className = 'feedback incorrect';
                if (!answeredRiddles.has(currentRiddleIndex) || answeredRiddles.size === 1) {
                    incorrectCount++;
                }
            }
            
            updateStats();
        }

        // 显示答案
        function showAnswer() {
            const answerDisplay = document.getElementById('answer-display');
            answerDisplay.textContent = `答案是：${riddles[currentRiddleIndex].answer}`;
        }

        // 下一题
        function nextRiddle() {
            currentRiddleIndex = (currentRiddleIndex + 1) % riddles.length;
            updateRiddle();
        }

        // 上一题
        function previousRiddle() {
            currentRiddleIndex = (currentRiddleIndex - 1 + riddles.length) % riddles.length;
            updateRiddle();
        }

        // 随机题目
        function randomRiddle() {
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * riddles.length);
            } while (newIndex === currentRiddleIndex && riddles.length > 1);
            currentRiddleIndex = newIndex;
            updateRiddle();
        }

        // 重新开始
        function resetGame() {
            currentRiddleIndex = Math.floor(Math.random() * riddles.length);
            answeredCount = 0;
            correctCount = 0;
            incorrectCount = 0;
            answeredRiddles.clear();
            updateRiddle();
            updateStats();
        }

        // 更新统计信息
        function updateStats() {
            document.getElementById('answered-count').textContent = answeredCount;
            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('incorrect-count').textContent = incorrectCount;
            const progressPercent = Math.round((answeredCount / riddles.length) * 100);
            document.getElementById('progress-percent').textContent = progressPercent;
        }

        // 监听回车键
        document.getElementById('answer-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });

        // 初始化游戏
        initGame();
    </script>
</body>
</html>
